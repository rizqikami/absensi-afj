<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi AFJ</title>
    <style>
        body { font-family: sans-serif; background: #e0f7fa; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .info-panel { background: #f1f9fd; padding: 15px; border-radius: 12px; border-left: 5px solid #0288D1; margin-bottom: 20px; font-size: 0.9rem; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        input, button { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #B3E5FC; box-sizing: border-box; }
        button { background: #B0BEC5; color: white; font-weight: bold; cursor: not-allowed; transition: 0.3s; border: none; }
        button.active { background: #0288D1; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8rem; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Absensi AFJ</h2>
        <div class="info-panel">
            <div class="info-row"><span>Nama:</span> <span id="namaEmp">-</span></div>
            <div class="info-row"><span>Jam Masuk:</span> <span id="jamMasukVal">-</span></div>
            <div class="info-row"><span>Lokasi:</span> <span id="lokasiVal">-</span></div>
            <div class="info-row"><span>Jarak:</span> <span id="jarakVal">- km</span></div>
        </div>
        <input type="text" id="id" placeholder="Masukkan ID Karyawan" oninput="debounceInfo()">
        <button id="btn" disabled>Masukkan ID Dahulu</button>
        <table>
            <thead><tr><th>Nama</th><th>Masuk</th><th>Keluar</th><th>Status</th></tr></thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwFHbuVZW3uVpxnrUWU8IKX3yo25ARr3iOZSmeWmnww3Va03m6UAdPPcfdIjTr7OHURdQ/exec';
        let timer;

        function debounceInfo() { clearTimeout(timer); timer = setTimeout(getInfo, 500); }

        function resetUI() {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.className = "";
            btn.innerText = "Masukkan ID Dahulu";
            document.getElementById('namaEmp').innerText = "-";
            document.getElementById('jamMasukVal').innerText = "-";
            document.getElementById('lokasiVal').innerText = "-";
            document.getElementById('jarakVal').innerText = "- km";
        }

        async function getInfo() {
            const id = document.getElementById('id').value;
            if(id.length < 3) { resetUI(); return; }
            
            const btn = document.getElementById('btn');
            // State 1: Mengunci tombol menjadi abu-abu saat mengambil data/GPS
            btn.innerText = "Memproses...";
            btn.disabled = true;
            btn.className = "";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(SCRIPT_URL, {
                        method:'POST', 
                        body:JSON.stringify({action:'getInfo', employee_id:id, lat:pos.coords.latitude, lng:pos.coords.longitude})
                    });
                    const data = await res.json();
                    
                    if(data.status === 'success') {
                        document.getElementById('namaEmp').innerText = data.nama;
                        document.getElementById('jamMasukVal').innerText = data.jamMasuk;
                        document.getElementById('lokasiVal').innerText = data.office;
                        document.getElementById('jarakVal').innerText = data.distance + " km";
                        
                        // State 2: Aktifkan tombol (Warna Biru) jika sukses terverifikasi
                        btn.disabled = false;
                        btn.className = "active";
                        btn.innerText = "Absen " + data.nextAction;
                        btn.dataset.tipe = data.nextAction;
                        btn.onclick = submitAbsen;
                    } else {
                        btn.innerText = data.message || "ID tidak ditemukan";
                    }
                } catch(err) {
                    btn.innerText = "Gangguan Jaringan";
                }
            }, (err) => {
                btn.innerText = "Gagal Mengunci GPS";
            }, { enableHighAccuracy: true, timeout: 7000 });
        }

        async function submitAbsen() {
            const btn = document.getElementById('btn');
            
            // State 3: Kunci tombol kembali menjadi abu-abu saat proses submit data berlangsung
            btn.innerText = "Memproses...";
            btn.disabled = true;
            btn.className = ""; 
            btn.onclick = null; // Cabut fungsi klik instan

            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 7000 });
                });
                
                const res = await fetch(SCRIPT_URL, {
                    method:'POST', 
                    body:JSON.stringify({
                        employee_id: document.getElementById('id').value, 
                        tipe_absen: btn.dataset.tipe, 
                        lat: pos.coords.latitude, 
                        lng: pos.coords.longitude
                    })
                });
                
                const data = await res.json();
                alert(data.message);
            } catch (err) {
                alert("Gagal mengirim absensi. Pastikan koneksi internet stabil dan GPS aktif.");
            } finally {
                // Halaman otomatis reload untuk memperbarui tabel log dan mereset tombol
                location.reload();
            }
        }

        async function loadLogs() {
            const res = await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'getLogs'})});
            const data = await res.json();
            if(data.status === 'success' && data.logs) {
                document.getElementById('logBody').innerHTML = data.logs.map(r => 
                    `<tr><td>${r.nama}</td><td>${r.masuk}</td><td>${r.keluar}</td><td>${r.status}</td></tr>`).join('');
            }
        }
        window.onload = loadLogs;
    </script>
</body>
</html>
