<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi</title>
    <style>
        /* CSS: Mengatur tampilan agar rapi dan tidak polos */
        body { font-family: 'Segoe UI', sans-serif; background-color: #E0F7FA; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #00838F; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #87CEEB; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #statusMsg { margin-top: 20px; padding: 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📍 Absensi Mobile</h2>
        <form id="absenForm">
            <input type="text" id="employeeId" placeholder="ID Karyawan" required>
            <input type="text" id="officeName" placeholder="Nama Kantor" required>
            <button type="submit">📡 Absen Sekarang</button>
        </form>
        <div id="statusMsg"></div>
    </div>

    <script>
        // --- BAGIAN INI SAJA YANG PERLU ANDA GANTI ---
        const SCRIPT_URL = 'PASTE_URL_WEB_APP_ANDA_DISINI'; 
        // ---------------------------------------------

        document.getElementById('absenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('statusMsg');
            msg.innerText = "Mengambil lokasi...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const payload = {
                    employee_id: document.getElementById('employeeId').value,
                    office_name: document.getElementById('officeName').value,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    tipe_absen: "Masuk"
                };
                
                try {
                    const res = await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        body: JSON.stringify(payload) 
                    });
                    const data = await res.json();
                    msg.innerText = data.message;
                } catch (err) {
                    msg.innerText = "Error: Gagal terhubung ke server.";
                }
            }, (err) => {
                msg.innerText = "GPS Gagal: Pastikan GPS aktif.";
            });
        });
    </script>
</body>
</html>
