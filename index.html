<!DOCTYPE html>
<html>
<body>
    <form id="absenForm">
        <input type="text" id="employeeId" placeholder="ID Karyawan" required><br>
        <input type="text" id="officeName" placeholder="Nama Kantor" required><br>
        <button type="submit">Absen Sekarang</button>
    </form>
    <div id="statusMsg"></div>

    <script>
        const SCRIPT_URL = 'PASTE_WEB_APP_URL_DISINI'; // WAJIB GANTI URL WEB APP ANDA
        
        document.getElementById('absenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('statusMsg').innerText = "Mengambil lokasi...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const payload = {
                    employee_id: document.getElementById('employeeId').value,
                    office_name: document.getElementById('officeName').value,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    tipe_absen: "Masuk"
                };
                
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const data = await res.json();
                document.getElementById('statusMsg').innerText = data.message;
            }, (err) => {
                document.getElementById('statusMsg').innerText = "GPS Gagal: " + err.message;
            });
        });
    </script>
</body>
</html>
