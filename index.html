<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi AFJ</title>
    <style>
        body { font-family: sans-serif; background: #e0f7fa; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0288D1; color: white; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Absensi AFJ</h2>
        <input type="text" id="id" placeholder="ID Karyawan" oninput="debounceInfo()">
        <button id="btn" onclick="submitAbsen()" disabled>Masukkan ID</button>
        <table>
            <thead><tr><th>Nama</th><th>Masuk</th><th>Keluar</th></tr></thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLyuh_r73iZBB7uR7bI_7M7akvPNKrTEWhsRmLyWRMytsDNdOG3tOAU3orHfv32twtgA/exec';
        let timer;

        function debounceInfo() {
            clearTimeout(timer);
            timer = setTimeout(getInfo, 500);
        }

        async function getInfo() {
            const id = document.getElementById('id').value;
            if(id.length < 3) return;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'getInfo', employee_id:id, lat:pos.coords.latitude, lng:pos.coords.longitude})});
                const data = await res.json();
                if(data.status === 'success') {
                    const btn = document.getElementById('btn');
                    btn.disabled = false;
                    btn.innerText = "Absen " + data.nextAction;
                    btn.dataset.tipe = data.nextAction;
                }
            });
        }

        async function submitAbsen() {
            const pos = await new Promise((resolve) => navigator.geolocation.getCurrentPosition(resolve));
            const res = await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({employee_id: document.getElementById('id').value, tipe_absen: document.getElementById('btn').dataset.tipe, lat: pos.coords.latitude, lng: pos.coords.longitude})});
            const data = await res.json();
            alert(data.message);
            location.reload();
        }

        async function loadLogs() {
            const res = await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'getLogs'})});
            const data = await res.json();
            document.getElementById('logBody').innerHTML = data.logs.map(r => `<tr><td>${r.nama}</td><td>${r.masuk}</td><td>${r.keluar}</td></tr>`).join('');
        }
        window.onload = loadLogs;
    </script>
</body>
</html>
