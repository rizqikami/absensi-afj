<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Absensi Karyawan AFJ</title>
    <style>
        :root { --bg: #E0F7FA; --btn: #0288D1; --danger: #D32F2F; }
        body { font-family: sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ccc; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Absensi AFJ</h2>
        <div id="info">Nama: <span id="namaEmp">-</span></div>
        <form id="absenForm">
            <input type="text" id="employeeId" placeholder="Masukkan ID Karyawan" oninput="getInfo()" required>
            <button type="submit" id="btnAction" disabled>Masukkan ID Dahulu</button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = 'Phttps://script.google.com/macros/s/AKfycbzOEOvBVJuTQF1Hc5T_0-205Ie45BN-HkLuruMlL5ILcV9yXmR1AEmoBAgwevIHKLAjiQ/exec';

        async function getInfo() {
            const id = document.getElementById('employeeId').value;
            const btn = document.getElementById('btnAction');
            if (id.length < 3) { btn.disabled = true; return; }
            
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getInfo', employee_id: id }) });
            const data = await res.json();
            if (data.status === "success") {
                document.getElementById('namaEmp').innerText = data.nama;
                btn.disabled = false;
                btn.innerText = "📡 Absen " + data.nextAction;
                btn.dataset.tipe = data.nextAction;
                btn.style.backgroundColor = (data.nextAction === "Pulang") ? "#D32F2F" : "#0288D1";
            }
        }

        document.getElementById('absenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        employee_id: document.getElementById('employeeId').value,
                        tipe_absen: document.getElementById('btnAction').dataset.tipe,
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude
                    }) 
                });
                const data = await res.json();
                alert(data.message);
                location.reload();
            });
        });
    </script>
</body>
</html>
