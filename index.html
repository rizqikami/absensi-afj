<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Karyawan AFJ</title>
    <style>
        body { font-family: sans-serif; background: #e0f7fa; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { width: 100%; max-width: 400px; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* Judul Mutlak di Tengah */
        .judul-program { text-align: center; color: #2c3e50; margin-top: 0; margin-bottom: 20px; font-weight: bold; }
        
        /* Panel Informasi Atas Berindentasi Rapi */
        .info-panel { background: #f1f9fd; padding: 15px; border-radius: 12px; border-left: 5px solid #0288D1; margin-bottom: 20px; }
        .info-row { display: flex; margin-bottom: 10px; font-size: 0.95rem; line-height: 1.4; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { width: 75px; font-weight: bold; color: #555; shrink: 0; }
        .info-value { padding-left: 15px; color: #222; word-break: break-word; } /* Indentasi teks nilai masuk ke dalam */

        input, button { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #B3E5FC; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border-color: #0288D1; }
        
        button { background: #0288D1; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        button:disabled { background: #B0BEC5; cursor: not-allowed; }
        
        /* Gaya Khusus Tombol Berdasarkan Aksi Dinamis */
        button.btn-masuk { background: #2ecc71; }
        button.btn-pulang { background: #e67e22; }

        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 0.85rem; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px 8px; text-align: left; }
        th { color: #555; font-weight: bold; background-color: #f8f9fa; }
        tr:hover { background-color: #f1f9fd; }
    </style>
</head>
<body>

    <div class="card">
        <h2 class="judul-program">Absensi Karyawan AFJ</h2>
        
        <div class="info-panel">
            <div class="info-row"><span class="info-label">Nama:</span><span id="namaEmp" class="info-value">-</span></div>
            <div class="info-row"><span class="info-label">Jabatan:</span><span id="jabatanEmp" class="info-value">-</span></div>
            <div class="info-row"><span class="info-label">Lokasi:</span><span id="lokasiVal" class="info-value">-</span></div>
        </div>

        <input type="text" id="idKaryawan" placeholder="Masukkan ID Karyawan">
        
        <button id="btnUtama" onclick="prosesPeriksaID()">Periksa Data ID</button>

        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Masuk</th>
                    <th>Keluar</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="logBody">
                </tbody>
        </table>
    </div>

    <script>
        // MASUKKAN URL DEPLOYMENT APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcrCo3twR5dmxTnUufVZQVqNc52euJmOmiWnSVXtkiR5NPU2fGiI-VVfpuzsUCIVxtQg/exec';

        // --- TAHAP 1: PERIKSA ID INSTAN (TANPA TUNGGU GPS) ---
        async function prosesPeriksaID() {
            const idInput = document.getElementById('idKaryawan');
            const btn = document.getElementById('btnUtama');
            const idValue = idInput.value.trim();

            if (idValue.length < 3) {
                alert("Silakan masukkan ID Karyawan yang valid terlebih dahulu!");
                return;
            }

            // Kunci UI & Set Loading Status Protektif
            idInput.disabled = true;
            btn.disabled = true;
            btn.innerText = "⏳ Sedang Proses...";

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getInfo', employee_id: idValue })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    // Update Informasi Panel Atas dengan Indentasi Rapi
                    document.getElementById('namaEmp').innerText = data.nama;
                    document.getElementById('jabatanEmp').innerText = data.jabatan;
                    document.getElementById('lokasiVal').innerText = "Akan ditentukan saat tombol absen ditekan";

                    // Ubah Tombol Menjadi Kendali Akses Kirim Absen Dinamis
                    btn.disabled = false;
                    btn.innerText = "Absen " + data.nextAction;
                    
                    // Berikan warna tombol berbeda agar interaktif
                    if (data.nextAction === "Masuk") {
                        btn.className = "btn-masuk";
                    } else {
                        btn.className = "btn-pulang";
                    }

                    // Alihkan fungsi klik tombol menuju fungsi submit absensi
                    btn.onclick = function() { prosesKirimAbsen(data.nextAction); };
                } else {
                    alert(data.message);
                    resetAwalUI();
                }
            } catch (err) {
                alert("Gangguan komunikasi ke server database.");
                resetAwalUI();
            }
        }

        // --- TAHAP 2: KUNCI GPS & KIRIM DATA ABSENSI ---
        function prosesKirimAbsen(tipeTarget) {
            const idInput = document.getElementById('idKaryawan');
            const btn = document.getElementById('btnUtama');
            
            btn.disabled = true;
            btn.className = "";
            btn.innerText = "⏳ Mengunci GPS & Mengirim...";

            // Sensor GPS baru dipicu berputar di sini demi efisiensi waktu karyawan
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'submitAbsen',
                            employee_id: idInput.value.trim(),
                            tipe_absen: tipeTarget,
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy // Data forensik akurasi dikirim ke server
                        })
                    });
                    const data = await res.json();
                    alert(data.message);
                } catch (err) {
                    alert("Koneksi internet bermasalah, gagal mengirim data absensi.");
                } finally {
                    // Segarkan halaman total agar sistem kembali bersih dan memuat data terbaru
                    location.reload();
                }
            }, (err) => {
                alert("Gagal mengunci titik koordinat. Pastikan izin GPS perangkat Anda sudah aktif!");
                btn.disabled = false;
                btn.innerText = "Absen " + tipeTarget;
                if (tipeTarget === "Masuk") btn.className = "btn-masuk"; else btn.className = "btn-pulang";
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        function resetAwalUI() {
            document.getElementById('idKaryawan').disabled = false;
            const btn = document.getElementById('btnUtama');
            btn.disabled = false;
            btn.className = "";
            btn.innerText = "Periksa Data ID";
            btn.onclick = prosesPeriksaID;
            document.getElementById('namaEmp').innerText = "-";
            document.getElementById('jabatanEmp').innerText = "-";
            document.getElementById('lokasiVal').innerText = "-";
        }

        // --- TAHAP 3: MUAT LOG TRANSPARANSI TIM HARI INI ---
        async function loadLogs() {
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getLogs' }) });
                const data = await res.json();
                if (data.status === 'success' && data.logs) {
                    document.getElementById('logBody').innerHTML = data.logs.map(r => 
                        `<tr>
                            <td><strong>${r.nama}</strong></td>
                            <td>${r.masuk}</td>
                            <td>${r.keluar}</td>
                            <td>${r.status}</td>
                         </tr>`
                    ).join('');
                }
            } catch (e) {
                console.error("Gagal memuat riwayat tabel bawah.");
            }
        }

        window.onload = loadLogs;
    </script>
</body>
</html>
