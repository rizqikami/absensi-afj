<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; background: #f4f7f6; }
        .card { width: 100%; max-width: 400px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0288D1; color: white; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Absensi AFJ</h2>
        <input type="text" id="id" placeholder="ID Karyawan" oninput="checkStatus()">
        <button id="btn" onclick="submitAbsen()" disabled>Masukkan ID Dahulu</button>
        
        <h3>Log Hari Ini</h3>
        <table>
            <thead><tr><th>Nama</th><th>Masuk</th><th>Keluar</th></tr></thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <script>
        const URL = 'PASTE_URL_WEB_APP_ANDA_DISINI';
        async function checkStatus() {
            const id = document.getElementById('id').value;
            if(id.length < 3) return;
            const res = await fetch(URL, {method:'POST', body:JSON.stringify({action:'getInfo', employee_id:id})});
            const data = await res.json();
            const btn = document.getElementById('btn');
            btn.disabled = false;
            btn.innerText = "Absen " + data.nextAction;
            btn.dataset.tipe = data.nextAction;
        }
        async function submitAbsen() {
            const id = document.getElementById('id').value;
            const tipe = document.getElementById('btn').dataset.tipe;
            await fetch(URL, {method:'POST', body:JSON.stringify({employee_id: id, tipe_absen: tipe, nama: "Karyawan"})});
            alert("Absen " + tipe + " Berhasil!");
            location.reload();
        }
        async function loadLogs() {
            const res = await fetch(URL, {method:'POST', body:JSON.stringify({action:'getLogs'})});
            const data = await res.json();
            document.getElementById('logBody').innerHTML = data.logs.map(r => 
                `<tr><td>${r.nama}</td><td>${r.masuk}</td><td>${r.keluar}</td></tr>`).join('');
        }
        window.onload = loadLogs;
    </script>
</body>
</html>
